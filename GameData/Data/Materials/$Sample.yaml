# This is not an actual material, but rather a spec that shows all names.
# For optimization, we distinguish the difference between how the packaged binary loads
# a material and how a Development binary loads is.

material:
    materialName: m_protoPBR # Name used by components

    # During devel this will load the GLSL, in packaging this will use the compiled Spir-V shaders.
    shader: regularPBR


    # This is loaded by the packaged version of the game. (packed channels, dual channel normals)
    # The pbr extension isnt custom, its just a renamed PNG. It use used by the engine in combination
    # with the shader definition to check if something is a color or a pbr texture. Color textures typically
    # consist of color, while pbr consists of material properties. The engine will treat both the same, but 
    # its used for another layer of error checking. The temporary names will also be used for error checking,
    # this one cannot be disabled.
    # If the shader has zero textures expected, then this doesnt need to be defined
    textures:
        base: Proto/proto1024.png # rgb=colors | a=normal X
        pbr: Proto/proto1024.pbr # r=AO map | g=roughness | b=metal | a=normal Y


    # These are parameters that the shader expects. Please consult your shader definition to know which to use.
    # Failure to provide one or wrong type will result in a crash. Additional non required params will be dropped
    # with a warning in the console.
    # If the shader has zero params expected, then this doesnt need to be defined
    params:
        colorTint: [1.0, 1.0, 1.0, 1.0]
        roughnessScale: 1.0
        metalnessScale: 1.0